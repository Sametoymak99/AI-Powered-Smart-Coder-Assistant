name: Otonom Kod Geliştirici (Cloud)

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Geliştirilecek Görev Açıklaması'
        required: true
        default: 'Masaüstünde hesap_makinesi.py oluşturan ve basit matematik işlemleri yapan kod yaz'
      filename:
        description: 'Proje Dosya Adı'
        required: true
        default: 'generated_project.py'
      retries:
        description: 'Maksimum Düzeltme Denemesi'
        required: false
        default: '3'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Klonla (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Git Yapılandırması
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # gh CLI yetkilendirmesi için git helper yapılandırması
          git config --global credential.helper store

      - name: Otonom Kodlayıcıyı Çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python autonomous_coder.py --task "${{ github.event.inputs.task }}" --filename "${{ github.event.inputs.filename }}" --retries ${{ github.event.inputs.retries }}
